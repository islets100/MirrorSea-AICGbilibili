# Skeleton compose file for this repository.
# App images are placeholders and should be built separately.
# The current codebase still needs docker-specific config to replace localhost with service names.

x-java-env: &java-env
  TZ: Asia/Shanghai
  SPRING_PROFILES_ACTIVE: docker
  SPRING_DATASOURCE_USERNAME: root
  SPRING_DATASOURCE_PASSWORD: root
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bilibili?useUnicode=true&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=GMT%2B8
  SPRING_ZIPKIN_BASE_URL: http://zipkin:9411

services:
  frontend-vue-nginx:
    image: nginx:1.27-alpine
    container_name: frontend-vue-nginx
    depends_on:
      - gateway
    ports:
      - "8088:80"
    volumes:
      - ./vue/dist:/usr/share/nginx/html:ro
    networks:
      - app-net

  frontend-labilibili-nginx:
    image: nginx:1.27-alpine
    container_name: frontend-labilibili-nginx
    depends_on:
      - gateway
    ports:
      - "8089:80"
    volumes:
      - ./vue/labilibili/dist:/usr/share/nginx/html:ro
    networks:
      - app-net

  gateway:
    image: ${GATEWAY_IMAGE:-aigcbilibili/gateway:latest}
    container_name: gateway
    depends_on:
      - mysql
      - redis
      - nacos
      - zipkin
    ports:
      - "8200:8200"
    environment:
      <<: *java-env
      SPRING_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    networks:
      - app-net

  user-center:
    image: ${USER_CENTER_IMAGE:-aigcbilibili/user-center:latest}
    container_name: user-center
    depends_on:
      - mysql
      - nacos
      - minio
      - zipkin
    ports:
      - "3000:3000"
    environment:
      <<: *java-env
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_NAME: minioadmin
      MINIO_ACCESS_SECRET: minioadmin
      MINIO_BUCKET_NAME: user-cover
    networks:
      - app-net

  video:
    image: ${VIDEO_IMAGE:-aigcbilibili/video:latest}
    container_name: video
    depends_on:
      - mysql
      - redis
      - minio
      - rocketmq-namesrv
      - rocketmq-broker
      - zipkin
    ports:
      - "10201:10201"
    environment:
      <<: *java-env
      SPRING_REDIS_HOST: redis
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_NAME: minioadmin
      MINIO_ACCESS_SECRET: minioadmin
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
    networks:
      - app-net

  notice:
    image: ${NOTICE_IMAGE:-aigcbilibili/notice:latest}
    container_name: notice
    depends_on:
      - mysql
      - redis
      - nacos
      - rocketmq-namesrv
      - rocketmq-broker
      - zipkin
    ports:
      - "30000:30000"
    environment:
      <<: *java-env
      SPRING_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
    networks:
      - app-net

  chat:
    image: ${CHAT_IMAGE:-aigcbilibili/chat:latest}
    container_name: chat
    depends_on:
      - mysql
      - nacos
      - zipkin
    ports:
      - "1688:1688"
    environment:
      <<: *java-env
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    networks:
      - app-net

  search:
    image: ${SEARCH_IMAGE:-aigcbilibili/search:latest}
    container_name: search
    depends_on:
      - mysql
      - redis
      - elasticsearch
      - xxl-job-admin
      - zipkin
    ports:
      - "8201:8201"
    environment:
      <<: *java-env
      SPRING_REDIS_HOST: redis
      ELASTICSEARCH_CLIENT_HOSTS: http://elasticsearch:9200
      XXL_JOB_ADMIN_ADDRESSES: http://xxl-job-admin:8080/xxl-job-admin
      XXL_JOB_ACCESS_TOKEN: default_token
      XXL_JOB_EXECUTOR_APPNAME: demo-service-impl
    networks:
      - app-net

  mysql:
    image: mysql:5.7
    container_name: mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bilibili
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos
    environment:
      MODE: standalone
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    networks:
      - app-net

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.24
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
      TZ: Asia/Shanghai
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - app-net

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.8
    container_name: rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    volumes:
      - rocketmq-namesrv-logs:/home/rocketmq/logs
    networks:
      - app-net

  rocketmq-broker:
    image: apache/rocketmq:4.9.8
    container_name: rocketmq-broker
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 autoCreateTopicEnable=true
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - rocketmq-broker-logs:/home/rocketmq/logs
      - rocketmq-broker-store:/home/rocketmq/store
    networks:
      - app-net

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: xxl-job-admin
    depends_on:
      - mysql
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/bilibili?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=root
    ports:
      - "9080:8080"
    networks:
      - app-net

  zipkin:
    image: openzipkin/zipkin:3.4.2
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs:
  minio-data:
  es-data:
  rocketmq-namesrv-logs:
  rocketmq-broker-logs:
  rocketmq-broker-store:
